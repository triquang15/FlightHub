# =============================================================================
# DEV INFRASTRUCTURE ONLY
# Starts Redis + Kafka with ports exposed to localhost.
# Use this when running services locally (not in Docker).
#
# Usage:
#   docker compose -f docker-compose/docker-compose.dev.yml up -d
#   docker compose -f docker-compose/docker-compose.dev.yml down
# =============================================================================

services:

  redis:
    image: redis:7.2-alpine
    container_name: gds-redis-dev
    ports:
      - "6379:6379"          # accessible at localhost:6379
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:4.1.1
    container_name: gds-kafka-dev
    ports:
      - "9092:9092"          # accessible at localhost:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092   # <-- localhost for local services
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
