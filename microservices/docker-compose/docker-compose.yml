# =============================================================================
# Airline Microservices — Docker Compose
# =============================================================================
# ONLY API GATEWAY (Port 8080) is exposed externally
# All other services are internal only
# =============================================================================

services:

  # ===========================================================================
  # INFRASTRUCTURE
  # ===========================================================================

  # ========== USER DB ==========
  userdb:
    image: mysql:8.0
    container_name: userdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3302:3306"  # LOCALHOST ONLY - for debugging if needed
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_user
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== AIRLINE CORE DB ==========
  airlinecoredb:
    image: mysql:8.0
    container_name: airlinecoredb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3303:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_core_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== FLIGHT OPS DB ==========
  flightopsdb:
    image: mysql:8.0
    container_name: flightopsdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3304:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_flight_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== LOCATION DB ==========
  locationdb:
    image: mysql:8.0
    container_name: locationdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3305:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_location_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== SEAT DB ==========
  seatdb:
    image: mysql:8.0
    container_name: seatdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3311:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_seat_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== PRICING DB ==========
  pricingdb:
    image: mysql:8.0
    container_name: pricingdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3307:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_pricing_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== ANCILLARY DB ==========
  ancillarydb:
    image: mysql:8.0
    container_name: ancillarydb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3308:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_ancillary_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== BOOKING DB ==========
  bookingdb:
    image: mysql:8.0
    container_name: bookingdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3309:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_booking_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15

  # ========== PAYMENT DB ==========
  paymentdb:
    image: mysql:8.0
    container_name: paymentdb
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "127.0.0.1:3310:3306"  # LOCALHOST ONLY
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: airline_payment_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - triquang15


  # ===========================================================================
  # REDIS — shared cache for location, airline, pricing, flight-ops, api-gateway
  # ===========================================================================

  redis:
    image: redis:7.2-alpine
    container_name: gds-redis
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.25
    # NO PORTS EXPOSED - Internal only
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - triquang15

  # ===========================================================================
  # KAFKA (KRaft Mode - No Zookeeper)
  # ===========================================================================

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    # NO PORTS EXPOSED - Internal only
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092  # Internal service name
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx1g"
    networks:
      - triquang15

  # ===========================================================================
  # CONFIG SERVER
  # ===========================================================================

  config-server:
    image: "triquang15ilo/gds-config-server:1.0.0"
    container_name: gds-config-server
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: "https://github.com/developer407/gds-config"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - triquang15

  # ===========================================================================
  # SERVICE REGISTRY (Eureka)
  # ===========================================================================

  service-registry:
    image: "triquang15ilo/gds-service-registry:1.0.0"
    container_name: gds-eureka-server
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - triquang15

  # ===========================================================================
  # API GATEWAY - ONLY EXTERNALLY EXPOSED SERVICE
  # ===========================================================================

  api-gateway:
    image: "triquang15ilo/gds-api-gateway:1.0.0"
    container_name: gds-api-gateway
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    ports:
      - "5000:5000"  # ONLY PORT EXPOSED TO THE WORLD
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "api-gateway"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    restart: unless-stopped
    networks:
      - triquang15

  # ===========================================================================
  # BUSINESS SERVICES - ALL INTERNAL (NO PORTS EXPOSED)
  # ===========================================================================

  user-service:
    image: "triquang15ilo/gds-user:1.0.0"
    container_name: gds-user-service
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://userdb:3306/airline_user?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    restart: unless-stopped
    networks:
      - triquang15

  airline-core-service:
    image: "triquang15ilo/gds-airline:1.0.0"
    container_name: gds-airline-core-service
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      airlinecoredb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "airline-core-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://airlinecoredb:3306/airline_core_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    restart: unless-stopped
    networks:
      - triquang15

  flight-ops-service:
    image: "triquang15ilo/gds-flight:1.0.0"
    container_name: gds-flight-ops-service
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      flightopsdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "flight-ops-service"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://flightopsdb:3306/airline_flight_db?useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://service-registry:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseG1GC"
    restart: unless-stopped
    networks:
      - triquang15

  location-service:
    image: "triquang15ilo/gds-location:1.0.0"
    container_name: gds-location-service
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    # NO PORTS EXPOSED - Internal only
