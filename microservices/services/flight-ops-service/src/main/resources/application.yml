# Application configuration for Flight Operations Service

spring:
  application:
    name: flight-ops-service

  config:
    import: optional:configserver:http://localhost:8888

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: update

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

# =========================
# RESILIENCE4J
# =========================
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

    instances:
      AirlineClient:
        base-config: default
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s

      LocationClient:
        base-config: default
        wait-duration-in-open-state: 20s

      PricingClient:
        base-config: default

      SeatClient:
        base-config: default

# =========================
# EUREKA
# =========================
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

  client:
    register-with-eureka: true
    fetch-registry: true

# =========================
# ACTUATOR
# =========================
management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents

  endpoint:
    health:
      show-details: always
    info:
      enabled: true

  health:
    circuitbreakers:
      enabled: true

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# =========================
# INFO
# =========================
info:
  app:
    name: ${spring.application.name}
    description: Manages flight schedules, instances, and real-time flight operations
    version: 1.0.0
    environment: development