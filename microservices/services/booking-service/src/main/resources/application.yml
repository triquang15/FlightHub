spring:
  application:
    name: booking-service

  config:
    import: optional:configserver:http://localhost:8888

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: booking-service-group

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3000ms
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - feign.FeignException

    instances:
      AncillaryClient:
        base-config: default
      FlightClient:
        base-config: default
        failure-rate-threshold: 40
        wait-duration-in-open-state: 45s
      PaymentClient:
        base-config: default
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
        minimum-number-of-calls: 5
      PricingClient:
        base-config: default
      SeatClient:
        base-config: default
      UserClient:
        base-config: default

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true

info:
  app:
    name: ${spring.application.name}
    description: Handles flight bookings, passenger management, and booking lifecycle
    version: 1.0.0
    environment: development

management:
  endpoints:
    web:
      exposure:
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  info:
    env:
      enabled: true        # required since Spring Boot 2.6 to expose info.* properties
    java:
      enabled: true        # shows JVM version
    os:
      enabled: true        # shows OS details
  health:
    circuitbreakers:
      enabled: true
