server:
  port: 8082
  shutdown: graceful
  compression:
    enabled: true

spring:
  application:
    name: user-service

  threads:
    virtual:
      enabled: true   # Java 21 virtual threads

  datasource:
    url: jdbc:postgresql://localhost:5432/flight_hub_user
    username: postgres
    password: 12345678
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UserServicePool
      maximum-pool-size: 20
      minimum-idle: 5
      auto-commit: false
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update   # dev only; prod => validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        jdbc.batch_size: 50

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

  sql:
    init:
      mode: never

jwt:
  secret: 8Kf$29LmQx!7Vp@3Nz#1TaYw%6HdRs^4Ju&0PcXg!9Mb@2QrDf#7LsWzXk*5Nt

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO
    com.triquang: DEBUG
    org.springframework.security: INFO