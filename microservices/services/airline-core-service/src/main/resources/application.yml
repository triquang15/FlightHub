server:
  port: 8083

spring:
  application:
    name: airline-core-service

  datasource:
    # NEON POSTGRESQL (PRODUCTION / CLOUD)
    url: jdbc:postgresql://ep-silent-darkness-aoh21u1p-pooler.c-2.ap-southeast-1.aws.neon.tech/flight_hub_airline?sslmode=require
    username: neondb_owner
    password: npg_FDqZpbe3Oml7
